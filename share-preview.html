<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シェア画像プレビュー</title>
<style>
  body { margin: 0; padding: 40px; background: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif; }
  .share-card {
    display: flex;
    width: 2046px;
    height: 1537px;
    border-radius: 0;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .card-front {
    width: 1023px;
    height: 1537px;
    flex-shrink: 0;
    border: 12px solid #c9933a;
    border-right: none;
    box-sizing: border-box;
  }
  .card-front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-back {
    width: 1023px;
    height: 1537px;
    background: #1a1208;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 80px;
    box-sizing: border-box;
    position: relative;
    border: 12px solid #c9933a;
    border-left: none;
  }
  .card-back::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 12px solid #a07d28;
    pointer-events: none;
  }
  .card-back::after {
    content: '';
    position: absolute;
    inset: 20px;
    border: 2px solid rgba(201,147,58,0.7);
    pointer-events: none;
  }
  .deco-top, .deco-bottom {
    position: absolute;
    width: calc(100% - 32px);
    height: auto;
    z-index: 2;
    pointer-events: none;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0.4;
    filter: contrast(1.5);
  }
  .deco-top { top: 16px; }
  .deco-bottom { bottom: 18px; }
  .back-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    width: 100%;
    max-width: 700px;
  }
  .logo {
    width: 480px;
    height: auto;
    margin-bottom: 8px;
  }
  .type-name {
    font-size: 80px;
    color: #c9933a;
    font-weight: 900;
    letter-spacing: 6px;
    font-family: 'Noto Serif JP', serif;
    margin-top: -10px;
  }
  .tagline {
    font-size: 26px;
    color: #d8ccb8;
    text-align: center;
    line-height: 1.6;
  }
  .divider {
    width: 80%;
    height: 1px;
    background: rgba(201,147,58,0.5);
    margin: 8px 0;
  }
  .highlight-section {
    text-align: center;
  }
  .highlight-label {
    font-size: 18px;
    color: #c9933a;
    margin-bottom: 8px;
  }
  .highlight-tag {
    font-size: 42px;
    color: #ffffff;
    font-weight: 700;
  }
  .highlight-text {
    font-size: 20px;
    color: #d8ccb8;
    line-height: 1.7;
    margin-top: 12px;
    text-align: center;
  }
  .layers-section {
    width: 100%;
    background: rgba(201,147,58,0.06);
    border: 1px solid rgba(201,147,58,0.3);
    border-radius: 8px;
    padding: 24px 30px;
  }
  .layers-title {
    font-size: 18px;
    color: #c9933a;
    text-align: center;
    font-weight: 700;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }
  .layer-row {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 18px;
    padding: 0 20px;
  }
  .layer-label {
    font-size: 17px;
    color: #8a7050;
    width: 50px;
    text-align: right;
    flex-shrink: 0;
  }
  .layer-value {
    font-size: 28px;
    color: #ffffff;
    font-weight: 700;
  }
  .layer-detail {
    font-size: 17px;
    color: #8a7050;
    margin-left: 4px;
  }
  .modifier {
    font-size: 22px;
    color: #8a7050;
    text-align: center;
    margin-top: 24px;
  }
  .footer {
    font-size: 17px;
    color: #c9933a;
    text-align: center;
    letter-spacing: 1px;
    margin-top: 24px;
  }
</style>
</head>
<body>

<div class="share-card">
  <!-- 表面: カード画像 -->
  <div class="card-front">
    <img src="16typecard/0Maverick01.png" alt="マーベリック">
  </div>

  <!-- 裏面: テキスト情報 -->
  <div class="card-back">
    <img class="deco-top" src="icons/yosumi01.png">
    <img class="deco-bottom" src="icons/yosumi02.png">
    <div class="back-content">
      <img class="logo" src="icons/Logo01.png" alt="羅占盤">

      <div class="type-name">マーベリック</div>
      <div class="tagline">群れを離れ、自分の領域で革命を起こす者</div>

      <div class="divider"></div>

      <div class="highlight-section">
        <div class="highlight-label">あなたのマーベリック像</div>
        <div class="highlight-tag">静かに導く参謀</div>
        <div class="highlight-text">先頭に立たず、裏から全体を動かすタイプ。<br>直感型で物事を処理し、独自の個性を持つ。</div>
      </div>

      <div class="layers-section">
        <div class="layers-title">人格レイヤー</div>
        <div class="layer-row">
          <span class="layer-label">表層</span>
          <span class="layer-value">情熱的で行動的</span>
          <span class="layer-detail">（射手座）</span>
        </div>
        <div class="layer-row">
          <span class="layer-label">社会</span>
          <span class="layer-value">楽しみながら表現する</span>
          <span class="layer-detail">（鳳閣星）</span>
        </div>
        <div class="layer-row">
          <span class="layer-label">本能</span>
          <span class="layer-value">目標を形にする実行力</span>
          <span class="layer-detail">（武曲）</span>
        </div>
        <div class="layer-row">
          <span class="layer-label">才能</span>
          <span class="layer-value">静かに導く参謀</span>
          <span class="layer-detail">（直感型）</span>
        </div>
        <div class="layer-row">
          <span class="layer-label">魂</span>
          <span class="layer-value">シンクロニシティの紋章</span>
          <span class="layer-detail">（赤い地球）</span>
        </div>
      </div>

      <div class="modifier">生き方の傾向: 晩成型 / 直感型</div>

      <div class="footer">rasenban — 9つの占術で読む、あなたの命盤</div>
    </div>
  </div>
</div>

</body>
</html>
